    <script>
        // effetto dinamico quando cambio pagina su desktop
var elements_to_watch = document.querySelectorAll(".watch");
    
    var callback = function(items) {
       items.forEach((item) => {
          if (item.isIntersecting && !item.target.classList.contains("in-page")) {
             item.target.classList.add("in-page");
          } else if (!item.isIntersecting) {
             item.target.classList.remove("in-page");
          }
       });
    }
    
    var observer = new IntersectionObserver(callback, {
       threshold: 0.8
    });
    
    elements_to_watch.forEach((element) => {
       observer.observe(element);
    });
 // effetto dinamico quando cambio pagina su desktop
 





// fa cambiare colore agli elementi della nav-bar quando sono sopra il pannello 
 $(document).ready(function() {
    $(window).on('scroll', function() {
        $('.section').each(function() {
            if ($(window).scrollTop() >= $(this).offset().top && $(window).scrollTop() < ($(this).offset().top + $(this).outerHeight())) {
                var sectionId = $(this).attr('id');
                $('.navbar-nav .nav-link').removeClass('active');
                $('.navbar-nav .nav-link[href="#' + sectionId + '"]').addClass('active');
            }
        });
    });
});
// fa cambiare colore agli elementi della nav-bar quando sono sopra il pannello 
   






// permette di far mandare le email tramite il form
function SendMail(){
    var params = {
        from_name : document.getElementById("firstname").value,
        email_id : document.getElementById("email").value,
        message: document.getElementById("message").value,
    }

    emailjs.send("service_0pl5l7o", "template_9975wp5", params).then(function (res) {
            // Utilizza il toast di Bootstrap al posto dell'alert
            $('.toast-body').text("Grazie per avermi contattato!");
            $('.toast').toast('show'); 
        });
}
// permette di far mandare le email tramite il form

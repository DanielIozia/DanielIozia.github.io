            <!-- ho tolto la classe watch e container, se lo rimetto si aggiusta da desktop (prima del login-form) -->

        <!-- TOAST -->
        <div class="toast" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="toast-header bg-color text-dark">
                <!-- <img src="" class="rounded mr-2" alt=""> -->
                <strong class="mx-auto">Email mandata con successo!✌🏼</strong>
                <button type="button" class="btn-dark" data-bs-dismiss="toast" aria-label="close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="toast-body text-center text-green">
                <strong>Email mandata con successo!</strong>
            </div>
        </div>


        <script>
    var emailSent = false; // Variabile di controllo per verificare se l'email è stata inviata

    function SendMail() {
        var firstName = document.getElementById("firstname").value.trim();
        var lastName = document.getElementById("lastname").value.trim();
        var email = document.getElementById("email").value.trim();
        var message = document.getElementById("message").value.trim();

        // Verifica se tutti i campi sono stati compilati
        if (firstName === "" || lastName === "" || email === "" || message === "") {
            //se almeno un campo non è stato compilato, non fai nulla
            return;
        }

        // Verifica se l'email è valida
        if (!validateEmail(email)) {
            //se l'email non è valida, non fai nulla
            return;
        }
        // Se l'email è già stata inviata, esci dalla funzione (ne manda solo una ogni refresh di pagina)
        if (emailSent) {
            return;
        }
        // Disabilita il pulsante
        document.getElementById("sendButton").disabled = true;

        // Crea oggetto con i parametri per l'invio dell'email
        var params = {
            from_name: firstName + lastName,
            email_id: email,
            message: message
        };

        // Invia l'email utilizzando emailjs
        emailjs.send("service_0pl5l7o", "template_9975wp5", params).then(function (res) {
            // Mostra il toast di conferma
            $('.toast-body').text("Email inviata con successo!");
            $('.toast').toast('show');
        }).finally(function () {
            // Riabilita il pulsante dopo che l'email è stata inviata o in caso di errore
            document.getElementById("sendButton").disabled = false;
            
            // Imposta la variabile di controllo a true per indicare che l'email è stata inviata
            emailSent = true;
        });
    }

        </script>
